version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: fieldsprout_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fieldsprout
      POSTGRES_PASSWORD: fieldsprout_dev
      POSTGRES_DB: fieldsprout
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fieldsprout']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fieldsprout_redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
